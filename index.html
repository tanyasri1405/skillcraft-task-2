<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pink Scientific Calculator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="calculator">

<div class="brand">

<h1>Vecto</h1>

<p>pt-5041-8.0.0.2</p>

</div>

<div class="screen">

<div id="expression"></div>

<div id="display">0</div>

</div>

<div class="top-buttons">

<button class="pink">SHIFT</button>

<button class="pink">ALPHA</button>

<button class="gray">MODE</button>

<button class="gray">CLR</button>

<button class="green">ON</button>

</div>

<div class="buttons">

<button class="function">sin</button>
<button class="function">cos</button>
<button class="function">tan</button>
<button class="function">log</button>
<button class="function">ln</button>

<button class="function">√</button>
<button class="function">x²</button>
<button class="function">xʸ</button>
<button class="function">(</button>
<button class="function">)</button>

<button class="number">7</button>
<button class="number">8</button>
<button class="number">9</button>
<button class="operator">÷</button>
<button class="clear">AC</button>

<button class="number">4</button>
<button class="number">5</button>
<button class="number">6</button>
<button class="operator">×</button>
<button class="delete">DEL</button>

<button class="number">1</button>
<button class="number">2</button>
<button class="number">3</button>
<button class="operator">-</button>
<button class="function">%</button>

<button class="number">0</button>
<button class="number">.</button>
<button class="function">π</button>
<button class="operator">+</button>
<button class="equals">=</button>

<button class="function">Ans</button>
<button class="function">EXP</button>
<button class="function">!</button>
<button class="function">1/x</button>
<button class="function">±</button>

</div>

<div class="bottom">

<div class="mode">

<select id="mode">

<option>Standard</option>

<option selected>Scientific</option>

<option>Programmer</option>

</select>

</div>

<div class="angle">

<button id="degBtn">DEG</button>

<button id="radBtn">RAD</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
